name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  FIREBASE_PROJECT_ID: novalingo-prod

jobs:
  # ─── Lint & Type Check ────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings 0

      - name: Prettier Check
        run: npx prettier --check "src/**/*.{ts,tsx,json,css}"

  # ─── Unit Tests ───────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: npx vitest run --coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─── Build ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm run build
        env:
          VITE_APP_ENV: production
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_USE_EMULATORS: 'false'
          VITE_ADMOB_INTERSTITIAL_IOS: ${{ secrets.VITE_ADMOB_INTERSTITIAL_IOS }}
          VITE_ADMOB_INTERSTITIAL_ANDROID: ${{ secrets.VITE_ADMOB_INTERSTITIAL_ANDROID }}
          VITE_ADMOB_REWARDED_IOS: ${{ secrets.VITE_ADMOB_REWARDED_IOS }}
          VITE_ADMOB_REWARDED_ANDROID: ${{ secrets.VITE_ADMOB_REWARDED_ANDROID }}
          VITE_REVENUECAT_API_KEY_APPLE: ${{ secrets.VITE_REVENUECAT_API_KEY_APPLE }}
          VITE_REVENUECAT_API_KEY_GOOGLE: ${{ secrets.VITE_REVENUECAT_API_KEY_GOOGLE }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

  # ─── Functions Build ──────────────────────────────────────
  functions-build:
    name: Build Functions
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Function Dependencies
        run: cd functions && npm ci

      - name: Build Functions
        run: cd functions && npm run build

  # ─── Deploy to Netlify (Staging Preview) ─────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build, functions-build]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify (Preview)
        run: netlify deploy --dir=dist --message "Staging deploy from ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy Firebase Functions & Rules (Staging)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore,storage --project novalingo-staging
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

  # ─── Deploy to Netlify (Production) ───────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, functions-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify (Production)
        run: netlify deploy --dir=dist --prod --message "Production deploy from ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy Firebase Functions & Rules (Production)
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore,storage --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}
