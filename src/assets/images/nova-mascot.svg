<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Nova the Owl - NovaLingo Mascot -->
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="60" ry="55" fill="#1E90FF"/>
  <ellipse cx="100" cy="130" rx="55" ry="50" fill="#4DA6FF"/>
  <!-- Belly -->
  <ellipse cx="100" cy="145" rx="35" ry="30" fill="#E8F4FD"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="45" fill="#1E90FF"/>
  <circle cx="100" cy="75" r="40" fill="#4DA6FF"/>
  <!-- Eyes -->
  <circle cx="82" cy="70" r="16" fill="white"/>
  <circle cx="118" cy="70" r="16" fill="white"/>
  <circle cx="85" cy="68" r="9" fill="#1A1A2E"/>
  <circle cx="121" cy="68" r="9" fill="#1A1A2E"/>
  <!-- Eye shine -->
  <circle cx="88" cy="65" r="3" fill="white"/>
  <circle cx="124" cy="65" r="3" fill="white"/>
  <!-- Beak -->
  <path d="M93 82 L100 95 L107 82 Z" fill="#FFA726"/>
  <!-- Ear tufts -->
  <path d="M65 45 L72 30 L80 50" fill="#1565C0"/>
  <path d="M135 45 L128 30 L120 50" fill="#1565C0"/>
  <!-- Wings -->
  <ellipse cx="45" cy="120" rx="18" ry="35" fill="#1565C0" transform="rotate(-15 45 120)"/>
  <ellipse cx="155" cy="120" rx="18" ry="35" fill="#1565C0" transform="rotate(15 155 120)"/>
  <!-- Feet -->
  <ellipse cx="80" cy="182" rx="15" ry="8" fill="#FFA726"/>
  <ellipse cx="120" cy="182" rx="15" ry="8" fill="#FFA726"/>
  <!-- Graduation cap -->
  <rect x="70" y="38" width="60" height="5" rx="2" fill="#1A1A2E"/>
  <polygon points="100,25 70,40 130,40" fill="#1A1A2E"/>
  <line x1="100" y1="25" x2="100" y2="15" stroke="#FFA726" stroke-width="2"/>
  <circle cx="100" cy="13" r="4" fill="#FFA726"/>
</svg>
