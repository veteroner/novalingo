<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Nova Happy - Celebrating state -->
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="60" ry="55" fill="#1E90FF"/>
  <ellipse cx="100" cy="130" rx="55" ry="50" fill="#4DA6FF"/>
  <!-- Belly -->
  <ellipse cx="100" cy="145" rx="35" ry="30" fill="#E8F4FD"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="45" fill="#1E90FF"/>
  <circle cx="100" cy="75" r="40" fill="#4DA6FF"/>
  <!-- Happy Eyes (closed, smiling) -->
  <path d="M72 68 Q82 58 92 68" stroke="#1A1A2E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M108 68 Q118 58 128 68" stroke="#1A1A2E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M82 85 Q100 100 118 85" stroke="#FFA726" stroke-width="3" fill="#FFA726"/>
  <!-- Blush -->
  <circle cx="72" cy="80" r="8" fill="#FF8A80" opacity="0.4"/>
  <circle cx="128" cy="80" r="8" fill="#FF8A80" opacity="0.4"/>
  <!-- Ear tufts -->
  <path d="M65 45 L72 30 L80 50" fill="#1565C0"/>
  <path d="M135 45 L128 30 L120 50" fill="#1565C0"/>
  <!-- Wings up (celebrating) -->
  <ellipse cx="38" cy="100" rx="18" ry="35" fill="#1565C0" transform="rotate(-40 38 100)"/>
  <ellipse cx="162" cy="100" rx="18" ry="35" fill="#1565C0" transform="rotate(40 162 100)"/>
  <!-- Feet -->
  <ellipse cx="80" cy="182" rx="15" ry="8" fill="#FFA726"/>
  <ellipse cx="120" cy="182" rx="15" ry="8" fill="#FFA726"/>
  <!-- Stars around -->
  <polygon points="30,30 33,22 36,30 44,30 38,35 40,43 33,38 26,43 28,35 22,30" fill="#FFD700"/>
  <polygon points="170,25 172,20 174,25 179,25 175,28 176,33 172,30 168,33 169,28 165,25" fill="#FFD700"/>
  <polygon points="160,60 162,55 164,60 169,60 165,63 166,68 162,65 158,68 159,63 155,60" fill="#FFD700"/>
</svg>
